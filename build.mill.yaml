mill-version: 1.1.3
mill-jvm-version: "graalvm-java25:25.0.1"
mill-build:
  jvmVersion: "graalvm-java25:25.0.2"
  jvmIndexVersion: latest.release
  mvnDeps:
    - "com.lihaoyi::mill-contrib-scoverage:$MILL_VERSION"

extends: [mill.contrib.scoverage.ScoverageModule, scalafmt.ScalafmtModule, NativeImageModule, _root_.build.ReleaseSupport]

#------------------------------------
# Scoverage settings
#------------------------------------
scoverageVersion: "2.5.2"

#------------------------------------
# JVM settings
#------------------------------------
jvmVersion: "graalvm-java25:25.0.2"
jvmIndexVersion: latest.release

#------------------------------------
# Scala settings
#------------------------------------
scalaVersion: "3.8.2"
scalacOptions:
  - "-Wvalue-discard"
  - "-Wnonunit-statement"
  - "-Wconf:msg=(unused.*value|discarded.*value|pure.*statement):error"
  - "-language:strictEquality"

#------------------------------------
# Maven dependencies
#------------------------------------
mvnDeps:
  - com.github.alexarchambault::case-app::2.1.0
  - com.outr::scribe::3.18.0
  - io.getkyo::kyo-core::1.0-RC1
  - io.getkyo::kyo-direct:1.0-RC1 
  - io.getkyo::kyo-prelude:1.0-RC1 


#------------------------------------
# Application options
#------------------------------------
mainClass: io.github.eleven19.mill.interceptor.Main

#------------------------------------
# Native image options
#------------------------------------
nativeImageOptions:
  - "--no-fallback"
