extends:
  - _root_.build.CommonScalaModule
  - PublishModule
  - SonatypeCentralPublishModule
  - _root_.build.MavenPluginSupport

artifactId: mill-interceptor-maven-plugin
moduleDeps:
  - "modules.mill-interceptor"

mvnDeps:
  - com.outr::scribe::3.18.0
  - com.github.ghostdogpr::purelogic::0.2.0
  - javax.inject:javax.inject:1
  - org.apache.maven:maven-core:3.9.9
  - org.apache.maven:maven-plugin-api:3.9.9
  - org.apache.maven.plugin-tools:maven-plugin-annotations:3.15.2
  - org.pkl-lang:pkl-core:0.31.0
  - org.virtuslab::scala-yaml:0.3.0

object test:
  extends:
    - ScalaTests
    - _root_.build.PklEnabledScalaTestModule
    - TestModule.ZioTest
  mvnDeps:
    - dev.zio::zio-test::2.1.24
    - dev.zio::zio-test-sbt::2.1.24

object itest:
  extends:
    - MavenPluginItestModule
    - _root_.build.PklEnabledScalaTestModule
  mvnDeps:
    - dev.zio::zio-test::2.1.24
    - dev.zio::zio-test-sbt::2.1.24
