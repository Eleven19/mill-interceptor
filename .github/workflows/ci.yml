name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: ./mill __.checkFormat

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile all modules
        run: ./mill __.compile

      - name: Run unit tests
        run: ./mill __.test

      - name: Run interceptor integration tests
        run: ./mill modules.mill-interceptor.itest.testLocal

      - name: Run Maven plugin integration tests
        run: ./mill modules.mill-interceptor-maven-plugin.itest.testForked

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Generate documentation site
        run: ./mill modules.mill-interceptor.docJar
