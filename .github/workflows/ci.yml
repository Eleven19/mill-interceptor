name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Mill
        uses: mill-build/mill-setup-action@v1

      - name: Compile all modules
        run: mill __.compile

      - name: Run unit tests
        run: mill test

      - name: Run integration tests
        run: mill itest
