name: Publish Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0) - omit the leading v"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ inputs.version || '' }}

  publish-core:
    needs: metadata
    runs-on: ubuntu-latest
    env:
      SONATYPE_USERNAME: ${{ secrets.ELEVEN19_SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.ELEVEN19_SONATYPE_PASSWORD }}
      PGP_SECRET: ${{ secrets.ELEVEN19_IO_PGP_SECRET_BASE64 }}
      PGP_PASSPHRASE: ${{ secrets.ELEVEN19_IO_PGP_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Publish library artifact
        shell: bash
        run: scripts/ci/publish-central.sh modules.mill-interceptor.publishSonatypeCentral "${{ needs.metadata.outputs.version }}"

      - name: Publish assembly jar artifact
        shell: bash
        run: scripts/ci/publish-central.sh modules.mill-interceptor.assemblyPublish.publishSonatypeCentral "${{ needs.metadata.outputs.version }}"

      - name: Publish Maven plugin artifact
        shell: bash
        run: scripts/ci/publish-central.sh modules.mill-interceptor-maven-plugin.publishSonatypeCentral "${{ needs.metadata.outputs.version }}"

  publish-native:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: modules.mill-interceptor.nativeLinuxAmd64Publish.publishSonatypeCentral
            runner: ubuntu-latest
          - module: modules.mill-interceptor.nativeLinuxAarch64Publish.publishSonatypeCentral
            runner: ubuntu-24.04-arm
          - module: modules.mill-interceptor.nativeMacosAmd64Publish.publishSonatypeCentral
            runner: macos-15-intel
          - module: modules.mill-interceptor.nativeMacosAarch64Publish.publishSonatypeCentral
            runner: macos-14
          - module: modules.mill-interceptor.nativeWindowsAmd64Publish.publishSonatypeCentral
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      SONATYPE_USERNAME: ${{ secrets.ELEVEN19_SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.ELEVEN19_SONATYPE_PASSWORD }}
      PGP_SECRET: ${{ secrets.ELEVEN19_IO_PGP_SECRET_BASE64 }}
      PGP_PASSPHRASE: ${{ secrets.ELEVEN19_IO_PGP_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Publish native artifact
        shell: bash
        run: scripts/ci/publish-central.sh "${{ matrix.module }}" "${{ needs.metadata.outputs.version }}"
