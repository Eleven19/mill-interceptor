name: Publish Maven Central

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: metadata
        uses: ./.github/actions/release-metadata

  publish-core:
    needs: metadata
    runs-on: ubuntu-latest
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_GPG_PRIVATE_KEY }}
      SONATYPE_GPG_PASSPHRASE: ${{ secrets.SONATYPE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.SONATYPE_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.SONATYPE_GPG_PASSPHRASE }}

      - name: Publish library artifact
        shell: bash
        run: scripts/ci/publish-central.sh publish "${{ needs.metadata.outputs.version }}"

      - name: Publish assembly jar artifact
        shell: bash
        run: scripts/ci/publish-central.sh assemblyPublish.publish "${{ needs.metadata.outputs.version }}"

  publish-native:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: nativeLinuxAmd64Publish.publish
            runner: ubuntu-latest
          - module: nativeLinuxAarch64Publish.publish
            runner: ubuntu-24.04-arm
          - module: nativeMacosAmd64Publish.publish
            runner: macos-13
          - module: nativeMacosAarch64Publish.publish
            runner: macos-14
          - module: nativeWindowsAmd64Publish.publish
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_GPG_PRIVATE_KEY: ${{ secrets.SONATYPE_GPG_PRIVATE_KEY }}
      SONATYPE_GPG_PASSPHRASE: ${{ secrets.SONATYPE_GPG_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ env.SONATYPE_GPG_PRIVATE_KEY }}
          passphrase: ${{ env.SONATYPE_GPG_PASSPHRASE }}

      - name: Publish native artifact
        shell: bash
        run: scripts/ci/publish-central.sh "${{ matrix.module }}" "${{ needs.metadata.outputs.version }}"
