name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

env:
  GIT_CLIFF_VERSION: "2.12.0"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ github.event.inputs.version }}

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Compute archive name
        id: archive-name
        shell: bash
        run: scripts/ci/compute-archive-name.sh "${{ needs.metadata.outputs.version }}" "${{ matrix.target }}"

      - name: Build release archive
        shell: bash
        run: scripts/ci/build-release-archive.sh "${{ needs.metadata.outputs.version }}" "${{ matrix.target }}" "${{ steps.archive-name.outputs.archive_name }}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: out/releaseArchive.dest/${{ steps.archive-name.outputs.archive_name }}
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
      RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
      RELEASE_PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: scripts/ci/create-release-tag.sh

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Install git-cliff
        shell: bash
        run: scripts/ci/install-git-cliff.sh "${{ env.GIT_CLIFF_VERSION }}"

      - name: Build release notes
        id: release-notes
        shell: bash
        run: scripts/ci/build-release-notes.sh "${{ needs.metadata.outputs.version }}"

      - name: Generate checksums
        shell: bash
        run: scripts/ci/generate-checksums.sh release-artifacts

      - name: Create or update GitHub release
        shell: bash
        env:
          RELEASE_NOTES_FILE: ${{ steps.release-notes.outputs.release_notes_file }}
        run: scripts/ci/create-or-update-github-release.sh

      - name: Upload release assets
        shell: bash
        run: scripts/ci/upload-release-assets.sh release-artifacts
