name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ github.event.inputs.version }}

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Compute archive name
        id: archive-name
        shell: bash
        run: |
          set -euo pipefail

          archive_name="$(
            COURSIER_CACHE="$RUNNER_TEMP/coursier" ./mill show releaseAssetName \
              --version "${{ needs.metadata.outputs.version }}" \
              --target "${{ matrix.target }}" \
            | sed -n 's/^"//; s/"$//; p' \
            | tail -n 1
          )"

          if [[ -z "$archive_name" ]]; then
            echo "Unable to determine archive name" >&2
            exit 1
          fi

          echo "archive_name=$archive_name" >>"$GITHUB_OUTPUT"

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail

          COURSIER_CACHE="$RUNNER_TEMP/coursier" ./mill show releaseArchive \
            --version "${{ needs.metadata.outputs.version }}" \
            --target "${{ matrix.target }}"

          test -f "out/releaseArchive.dest/${{ steps.archive-name.outputs.archive_name }}"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: out/releaseArchive.dest/${{ steps.archive-name.outputs.archive_name }}
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.metadata.outputs.tag }}
      RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
      RELEASE_PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "$RELEASE_TAG"

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum * > SHA256SUMS

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail

          prerelease_flag="$RELEASE_PRERELEASE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            release_id="$(gh release view "$RELEASE_TAG" --json databaseId -q .databaseId)"

            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              --field tag_name="$RELEASE_TAG" \
              --field name="$RELEASE_NAME" \
              --field prerelease="$prerelease_flag"
          else
            gh api \
              --method POST \
              "repos/$GITHUB_REPOSITORY/releases" \
              --field tag_name="$RELEASE_TAG" \
              --field name="$RELEASE_NAME" \
              --field prerelease="$prerelease_flag" \
              --field generate_release_notes=true
          fi

      - name: Upload release assets
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
